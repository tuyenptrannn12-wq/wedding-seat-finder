<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Seat</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f8f5f2;
  text-align: center;
  padding: 40px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
  font-size: 24px;
  margin-bottom: 10px;
}

p {
  color: #777;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
}

.result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>Find Your Seat</h1>
  <p>Type your name below</p>

  <input type="text" id="search" placeholder="e.g. Sarah Nguyen" onkeyup="findGuest()">

  <div class="result" id="result"></div>
</div>

<script>
const guests = {
  "sarah nguyen": "Table 6",
  "john tran": "Table 3",
  "emily le": "Table 2"
};

function findGuest() {
  let input = document.getElementById("search").value.toLowerCase().trim();
  let result = document.getElementById("result");

  if (guests[input]) {
    result.innerHTML = "✨ You are seated at <br>" + guests[input];
  } else {
    result.innerHTML = "No match found. Please check spelling.";
  }
}
</script>

</body>
</html>
